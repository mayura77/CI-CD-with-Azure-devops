name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Stage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Application
        run: echo "Build completed successfully"

      - name: Create Build Artifact
        run: |
          mkdir output
          echo "This is the build artifact" > output/build.txt

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: output/build.txt

  test:
    name: Test Stage
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Run Test
        run: cat missing-file.txt

  deploy:
    name: Deploy Stage
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deployment Confirmation
        run: echo "Application deployed successfully"
